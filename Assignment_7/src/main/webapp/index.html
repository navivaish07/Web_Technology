<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstore Application</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #ffffff;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 12px 32px rgba(37, 99, 235, 0.16);
            text-align: center;
            width: min(420px, 90vw);
        }

        h1 {
            margin-top: 0;
            color: #1e3a8a;
        }

        p {
            color: #475569;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        a {
            display: inline-block;
            padding: 12px 22px;
            background-color: #2563eb;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        a:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Bookstore Application</h1>
        <p>View the available books or add a new book directly from the browser.</p>
        <div class="actions">
            <a href="books">View Books</a>
            <a href="add-book.html">Add Book</a>
        </div>
    </div>
</body>
</html>
