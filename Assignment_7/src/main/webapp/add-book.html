<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #ffffff;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 12px 32px rgba(37, 99, 235, 0.16);
            width: min(520px, 100%);
        }

        h1 {
            margin-top: 0;
            color: #1e3a8a;
            text-align: center;
        }

        form {
            display: grid;
            gap: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #334155;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 8px;
        }

        button,
        a {
            padding: 12px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        button {
            background-color: #2563eb;
            color: #ffffff;
        }

        a {
            background-color: #e2e8f0;
            color: #1e293b;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Add New Book</h1>
        <form action="books" method="post">
            <div>
                <label for="book_title">Book Title</label>
                <input type="text" id="book_title" name="book_title" required>
            </div>

            <div>
                <label for="book_author">Book Author</label>
                <input type="text" id="book_author" name="book_author" required>
            </div>

            <div>
                <label for="book_price">Book Price</label>
                <input type="number" id="book_price" name="book_price" step="0.01" min="0" required>
            </div>

            <div>
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" name="quantity" min="0" required>
            </div>

            <div class="actions">
                <button type="submit">Add Book</button>
                <a href="index.html">Back to Home</a>
            </div>
        </form>
    </div>
</body>
</html>
